name: CodeScribe PR Intelligence
description: Generate CodeScribe documentation, risk, security, and review reports for a pull request.
inputs:
  post-comment:
    description: Upsert a sticky CodeScribe summary comment on the pull request.
    required: false
    default: "false"
  post-review:
    description: Publish a real GitHub pull request review.
    required: false
    default: "false"
  auto-approve:
    description: Allow CodeScribe to publish APPROVE reviews. When false, APPROVE is downgraded to COMMENT.
    required: false
    default: "false"
  fail-on-risk:
    description: Fail the workflow when the computed risk score exceeds risk-threshold.
    required: false
    default: "false"
  risk-threshold:
    description: Risk threshold used when fail-on-risk is enabled.
    required: false
    default: "70"
  llm-provider:
    description: "LLM provider to use: auto, ollama, gemini, generic_api, local_model, or local_fallback."
    required: false
    default: auto
  model:
    description: Optional provider model override.
    required: false
    default: ""
  llm-api-key:
    description: Optional API key for Gemini or OpenAI-compatible providers.
    required: false
    default: ""
  llm-api-base-url:
    description: Optional OpenAI-compatible chat completions base URL.
    required: false
    default: ""
  include:
    description: Comma-separated glob patterns to include.
    required: false
    default: ""
  exclude:
    description: Comma-separated glob patterns to exclude.
    required: false
    default: ""
  config-file:
    description: Path to the per-repository CodeScribe config file.
    required: false
    default: .codescribe.yml
  output-dir:
    description: Directory where CodeScribe reports are written.
    required: false
    default: codescribe-reports
  write-artifacts:
    description: Write Markdown report artifacts into output-dir.
    required: false
    default: "false"
  annotate-code:
    description: Add AST-validated comment-only annotations above changed functions/classes.
    required: false
    default: "true"
  commit-documentation:
    description: Commit comment-only annotations and documentation.md back to the PR branch.
    required: false
    default: "true"
  documentation-file:
    description: Audit documentation file updated on the PR branch.
    required: false
    default: documentation.md
branding:
  icon: git-pull-request
  color: blue
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install CodeScribe
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e "$GITHUB_ACTION_PATH[dev]"

    - name: Run CodeScribe
      shell: bash
      env:
        CODESCRIBE_MODE: github_action
        POST_PR_COMMENT: ${{ inputs.post-comment }}
        AUTO_POST_REVIEWS: ${{ inputs.post-review }}
        GITHUB_TOKEN: ${{ github.token }}
        LLM_PROVIDER: ${{ inputs.llm-provider }}
        GEMINI_API_KEY: ${{ inputs.llm-api-key }}
        GENERIC_LLM_API_KEY: ${{ inputs.llm-api-key }}
        GENERIC_LLM_API_BASE_URL: ${{ inputs.llm-api-base-url }}
      run: |
        codescribe analyze-pr \
          --repo "${{ github.repository }}" \
          --pr-number "${{ github.event.pull_request.number }}" \
          --base-ref "${{ github.event.pull_request.base.sha }}" \
          --head-ref "${{ github.event.pull_request.head.sha }}" \
          --output-dir "${{ inputs.output-dir }}" \
          --post-comment "${{ inputs.post-comment }}" \
          --post-review "${{ inputs.post-review }}" \
          --auto-approve "${{ inputs.auto-approve }}" \
          --fail-on-risk "${{ inputs.fail-on-risk }}" \
          --risk-threshold "${{ inputs.risk-threshold }}" \
          --llm-provider "${{ inputs.llm-provider }}" \
          --model "${{ inputs.model }}" \
          --include "${{ inputs.include }}" \
          --exclude "${{ inputs.exclude }}" \
          --config-file "${{ inputs.config-file }}" \
          --write-artifacts "${{ inputs.write-artifacts }}" \
          --annotate-code "${{ inputs.annotate-code }}" \
          --commit-documentation "${{ inputs.commit-documentation }}" \
          --documentation-file "${{ inputs.documentation-file }}" \
          --head-branch "${{ github.event.pull_request.head.ref }}" \
          --pr-author "${{ github.event.pull_request.user.login }}" \
          --pr-url "${{ github.event.pull_request.html_url }}"
